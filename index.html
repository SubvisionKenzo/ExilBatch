<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>API</title>

    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #1b1b1b, #2a2a2a);
            font-family: Arial, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #box {
            text-align: center;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success {
            color: #4CAF50;
        }

        .error {
            color: #ff4444;
        }

        #circle {
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% {
                r: 10;
            }

            50% {
                r: 12;
            }

            100% {
                r: 10;
            }
        }
    </style>

    <script>
        async function start() {
            const params = new URLSearchParams(window.location.search);
            const key = params.get("key");
            const file = params.get("file");

            const svgText = document.getElementById("svgText");
            const message = document.getElementById("message");

            // Protection : si pas de clé ou mauvaise clé → fermeture
            if (!key || key !== "EXIL-API-2025") {
                window.close();
                return;
            }

            // Protection : si pas d'argument file -> fermeture
            if (!file) {
                window.close();
                return;
            }

            // Charger version.json
            let versionInfo = null;
            try {
                versionInfo = await fetch("/version.json").then(r => r.json());
            } catch {
                window.close();
                return;
            }

            let filename = file || versionInfo.file;
            let url = "/version/" + filename;

            // Vérifier si le fichier existe
            const exists = await fetch(url, { method: "HEAD" });

            // Protection : si fichier introuvable → fermeture
            if (!exists.ok) {
                //window.close(); // disabled/desactivé
                return;
            }

            // Succès → afficher message + télécharger
            svgText.textContent = "OK";
            svgText.setAttribute("fill", "#4CAF50");
            message.textContent = "Téléchargement en cours...";
            message.classList.add("success");

            const a = document.createElement("a");
            a.href = url;
            a.download = filename;
            a.click();

            // Fermer après 1 seconde
            setTimeout(() => window.close(), 1000);
        }

        window.onload = start;
    </script>
</head>
